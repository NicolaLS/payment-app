name: iOS Build

permissions:
  contents: read

env:
  JAVA_VERSION: '21'

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "assets/**"
      - "test.apks"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "assets/**"
      - "test.apks"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App (Debug)
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: ./.github/actions/validate-gradle-wrapper

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Kotlin/Native
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-${{ runner.arch }}-konan-${{ hashFiles('app/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-konan-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run iOS Simulator Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      - name: Upload iOS test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: app/composeApp/build/reports/tests/
          retention-days: 14

      - name: Build iOS App
        working-directory: app/iosApp
        run: |
          xcodebuild build \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
