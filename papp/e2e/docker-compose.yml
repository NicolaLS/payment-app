name: papp-e2e

services:
  bitcoind:
    image: bitcoin/bitcoin:28.1
    command:
      - -regtest=1
      - -server=1
      - -printtoconsole=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=regtest
      - -rpcpassword=regtest
      - -fallbackfee=0.0002
      - -txindex=1
    ports:
      - "18443:18443"
    volumes:
      - bitcoind:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=regtest", "-rpcpassword=regtest", "getblockchaininfo"]
      interval: 2s
      timeout: 5s
      retries: 30

  nostr-relay:
    image: scsibug/nostr-rs-relay:0.8.9
    environment:
      RUST_LOG: nostr_rs_relay=debug,info
    ports:
      - "7777:8080"
    volumes:
      - ./nostr-rs-relay/config.toml:/usr/src/app/config.toml:ro
      - nostr_relay:/usr/src/app/db

  cln-payer:
    build:
      context: .
      dockerfile: cln-nip47.Dockerfile
    depends_on:
      bitcoind:
        condition: service_healthy
      nostr-relay:
        condition: service_started
    environment:
      LIGHTNINGD_NETWORK: regtest
    command:
      - --bitcoin-rpcconnect=bitcoind
      - --bitcoin-rpcport=18443
      - --bitcoin-rpcuser=regtest
      - --bitcoin-rpcpassword=regtest
      - --alias=papp-e2e-payer
      - --addr=0.0.0.0:9735
      - --log-level=debug
      - --plugin=/usr/local/bin/cln-nip47
      - --nip47-relays=ws://nostr-relay:8080
      - --nip47-notifications=false
    ports:
      - "19735:9735"
    volumes:
      - cln_payer:/root/.lightning

  cln-receiver:
    image: elementsproject/lightningd:v25.12.1
    depends_on:
      bitcoind:
        condition: service_healthy
    environment:
      LIGHTNINGD_NETWORK: regtest
    command:
      - --bitcoin-rpcconnect=bitcoind
      - --bitcoin-rpcport=18443
      - --bitcoin-rpcuser=regtest
      - --bitcoin-rpcpassword=regtest
      - --alias=papp-e2e-receiver
      - --addr=0.0.0.0:9735
      - --log-level=debug
    ports:
      - "19736:9735"
    volumes:
      - cln_receiver:/root/.lightning

  test-harness:
    build:
      context: ./harness
      dockerfile: Dockerfile
    depends_on:
      bitcoind:
        condition: service_healthy
      cln-payer:
        condition: service_started
      cln-receiver:
        condition: service_started
      nostr-relay:
        condition: service_started
    environment:
      BITCOIN_RPC_URL: http://bitcoind:18443
      BITCOIN_RPC_USER: regtest
      BITCOIN_RPC_PASSWORD: regtest
      CLN_PAYER_DIR: /cln/payer
      CLN_RECEIVER_DIR: /cln/receiver
      CLN_RECEIVER_HOST: cln-receiver
      CLN_RECEIVER_PORT: "9735"
      NWC_LABEL: papp-e2e
      NWC_BUDGET_MSAT: "100000000"
      NWC_BUDGET_INTERVAL: 1d
      PUBLIC_NOSTR_RELAY_URL: ${PUBLIC_NOSTR_RELAY_URL:-ws://127.0.0.1:7777}
    ports:
      - "3021:3021"
    volumes:
      - cln_payer:/cln/payer
      - cln_receiver:/cln/receiver

volumes:
  bitcoind:
  cln_payer:
  cln_receiver:
  nostr_relay:
