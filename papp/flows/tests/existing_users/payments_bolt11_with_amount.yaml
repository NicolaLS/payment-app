appId: xyz.lilsus.papp.e2e
---
- launchApp:
    clearState: true
    clearKeychain: true

- setPermissions:
    permissions:
      all: allow

- openLink:
    link: ${NWC_URI_COINOS}
- tapOn: "Lasr E2E"
- runFlow:
    when:
      visible: "Just once"
    commands:
      - tapOn: "Just once"

# wait for wallet add / onboarding completion to settle
- waitForAnimationToEnd
# ideally wait for a stable pay-screen element here

- runScript: ../../utils/create_invoice.js

# e2e fake-camera path, so this tests scanner/auto-pay behavior
- openLink:
    link: "bitcoin:?lightning=${output.bolt11}&source=camera"
- tapOn: "Lasr E2E"
- runFlow:
    when:
      visible: "Just once"
    commands:
     - tapOn: "Just once"

- runScript: ../../utils/assert_invoice_paid.js

# - runFlow: "../new_users/onboarding_complete_coinos.yaml"


